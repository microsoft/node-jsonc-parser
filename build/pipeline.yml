name: $(Date:yyyyMMdd)$(Rev:.r)

trigger:
  batch: true
  branches:
    include:
      - main
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-engineering
      ref: main
      endpoint: Monaco

parameters:
  - name: quality
    displayName: Quality
    type: string
    default: latest
    values:
      - latest
      - next
  - name: publishPackage
    displayName: 🚀 Publish jsonc-parser
    type: boolean
    default: false

extends:
  template: azure-pipelines/npm-package/pipeline.yml@templates
  parameters:
    npmPackages:
      - name: jsonc-parser

        testPlatforms:
          - name: Linux
            nodeVersions:
              - 22.x
          - name: MacOS
            nodeVersions:
              - 22.x
          - name: Windows
            nodeVersions:
              - 22.x

        buildSteps:
          - script: npm ci
            displayName: Install dependencies

        testSteps:
          - script: npm ci
            displayName: Install dependencies
          - script: npm test
            displayName: Test npm package

        preReleaseTag: next
        publishPackage: ${{ parameters.publishPackage }}
        publishRequiresApproval: false
